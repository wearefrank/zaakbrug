name: Continuous Integration

on:
  pull_request:
    branches:
      - main
      - master
  merge_group:
    branches:
      - main
      - master

jobs:
  version-next:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version-next: ${{ steps.reference.outputs.next-reference }}
      version-next-strict: ${{ steps.reference.outputs.next-reference }}
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            github.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2

      - name: Next Reference
        id: reference
        uses: wearefrank/ci-cd-templates/next-reference@d7447a21c0c753a1e0869cfa87aff768454a667b #2.4.9

  ci:
    uses: wearefrank/ci-cd-templates/.github/workflows/ci-generic.yml@d7447a21c0c753a1e0869cfa87aff768454a667b #2.4.9
    needs:
      - version-next
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
    with:
      version: ${{ needs.version-next.outputs.version-next }}
      run-frank-till-healthy-enabled: false

  larva:
    uses: wearefrank/ci-cd-templates/.github/workflows/larva-testrunner.yml@d7447a21c0c753a1e0869cfa87aff768454a667b #2.4.9
    needs:
      - version-next
      - ci
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
    with:
      image-ref: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-staging@${{ needs.ci.outputs.image-digest }}
      setup-script: |
        set -x
        docker run -p 8080:8080 -e dtap.stage=LOC -d ${IMAGE_ID:-${IMAGE_REF}}
      teardown-script: |
        set -x
        docker stop ${CONTAINER_ID}
        docker rm --volumes ${CONTAINER_ID}

  check-configuration-warnings:
    runs-on: ubuntu-latest
    needs:
      - version-next
      - ci
    steps:
      - name: Check For Configuration Warnings
        uses: wearefrank/ci-cd-templates/frank-run-till-healthy@d7447a21c0c753a1e0869cfa87aff768454a667b #2.4.9
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-staging@${{ needs.ci.outputs.image-digest }}
          setup-script: |
            set -x
            docker run -p 8080:8080 -e dtap.stage=LOC -d ${IMAGE_ID:-${IMAGE_REF}}
          teardown-script: |
            set -x

            WARNINGS=$(docker exec "${CONTAINER_ID}" \
              curl -X GET 'http://localhost:8080/iaf/api/server/warnings' \
              --header 'Content-Type: application/json')

            docker stop ${CONTAINER_ID}
            docker rm --volumes ${CONTAINER_ID}

            WARNING_COUNT=$(echo "${WARNINGS}" | jq '[.[] | objects | (.warnings // []) | length] | add // 0')

            if [ "${WARNING_COUNT}" -gt 0 ]; then
              echo "## :warning: Configuration Warnings" >> "${GITHUB_STEP_SUMMARY}"
              echo "" >> "${GITHUB_STEP_SUMMARY}"
              while IFS= read -r warning; do
                echo "- ${warning}" >> "${GITHUB_STEP_SUMMARY}"
              done < <(echo "${WARNINGS}" | jq -r '[.[] | objects | (.warnings // [])] | flatten | .[]')
            fi

            if [ "${WARNING_COUNT}" -gt 0 ]; then
              echo "Error: ${WARNING_COUNT} warning(s) found across configurations" >&2
              exit 1
            fi

  soapui:
    uses: wearefrank/ci-cd-templates/.github/workflows/soapui-testrunner.yml@d7447a21c0c753a1e0869cfa87aff768454a667b #2.4.9
    needs:
      - ci
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
    with:
      soapui-project: 'e2e/SoapUI/zaakbrug-e2e-soapui-project.xml'
      image-ref: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-staging@${{ needs.ci.outputs.image-digest }}
      setup-script: |
        docker compose -f compose.frank.loc.yaml -f ./contrib/compose.frank.postgres.yaml -f ./contrib/compose.openzaak.loc.yaml up -d
        echo "Services started. Waiting for OpenZaak to be healthy..."
        timeout 300s bash -c 'until [ "$(docker inspect -f "{{.State.Health.Status}}" open-zaak.dev 2>/dev/null)" == "healthy" ]; do sleep 5; done'
        echo "SUCCESS: OpenZaak is healthy. Proceeding to the next step..."
      teardown-script: |
        docker compose -f compose.frank.loc.yaml -f ./contrib/compose.frank.postgres.yaml -f ./contrib/compose.openzaak.loc.yaml down -v
