name: Release

on:
  push:
    branches:
      - main
      - master

jobs:
  analyze-commits:
    runs-on: ubuntu-latest
    outputs:
      version-next: ${{ steps.next-version.outputs.release-version }}
      version-next-tag: ${{ steps.next-version.outputs.release-tag }}
      version-next-type: ${{ steps.next-version.outputs.release-type }}
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          disable-sudo: true
          egress-policy: audit
          allowed-endpoints: >
            github.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
      
      - name: "Setup Node"
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: yarn global add semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github @semantic-release/exec @semantic-release/release-notes-generator @semantic-release/commit-analyzer conventional-changelog-conventionalcommits
      
      - name: Get next version
        id: next-version
        run: semantic-release --dryRun
        env:
          GITHUB_TOKEN: ${{ secrets.WEAREFRANK_BOT_PAT }}
          GH_TOKEN: ${{ secrets.WEAREFRANK_BOT_PAT }}

  ci:
    uses: wearefrank/ci-cd-templates/.github/workflows/ci-generic.yml@00b8c33dd29ef328ad7aa1a2732dc6f41f2e03f3 #2.4.10
    needs: analyze-commits
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
    if: ${{ needs.analyze-commits.outputs.version-next-type != '' }}
    with:
      version: ${{ needs.analyze-commits.outputs.version-next }}
      run-frank-till-healthy-enabled: false

  larva:
    uses: wearefrank/ci-cd-templates/.github/workflows/larva-testrunner.yml@00b8c33dd29ef328ad7aa1a2732dc6f41f2e03f3 #2.4.10
    needs:
      - analyze-commits
      - ci
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
    with:
      image-ref: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-staging@${{ needs.ci.outputs.image-digest }}
      setup-script: |
        set -x
        docker run -p 8080:8080 -e dtap.stage=LOC -d ${IMAGE_ID:-${IMAGE_REF}}
      teardown-script: |
        set -x
        docker stop ${CONTAINER_ID}
        docker rm --volumes ${CONTAINER_ID}

  check-configuration-warnings:
    runs-on: ubuntu-latest
    needs:
      - analyze-commits
      - ci
    steps:
      - name: Check For Configuration Warnings
        uses: wearefrank/ci-cd-templates/frank-run-till-healthy@00b8c33dd29ef328ad7aa1a2732dc6f41f2e03f3 #2.4.10
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-staging@${{ needs.ci.outputs.image-digest }}
          setup-script: |
            set -x
            docker run -p 8080:8080 -e dtap.stage=LOC -d ${IMAGE_ID:-${IMAGE_REF}}
          teardown-script: |
            set -x

            WARNINGS=$(docker exec "${CONTAINER_ID}" \
              curl -X GET 'http://localhost:8080/iaf/api/server/warnings' \
              --header 'Content-Type: application/json')

            docker stop ${CONTAINER_ID}
            docker rm --volumes ${CONTAINER_ID}

            WARNING_COUNT=$(echo "${WARNINGS}" | jq '[.[] | objects | (.warnings // []) | length] | add // 0')

            if [ "${WARNING_COUNT}" -gt 0 ]; then
              echo "## :warning: Configuration Warnings" >> "${GITHUB_STEP_SUMMARY}"
              echo "" >> "${GITHUB_STEP_SUMMARY}"
              while IFS= read -r warning; do
                echo "- ${warning}" >> "${GITHUB_STEP_SUMMARY}"
              done < <(echo "${WARNINGS}" | jq -r '[.[] | objects | (.warnings // [])] | flatten | .[]')
            fi

            if [ "${WARNING_COUNT}" -gt 0 ]; then
              echo "Error: ${WARNING_COUNT} warning(s) found across configurations" >&2
              exit 1
            fi

  soapui:
    uses: wearefrank/ci-cd-templates/.github/workflows/soapui-testrunner.yml@00b8c33dd29ef328ad7aa1a2732dc6f41f2e03f3 #2.4.10
    needs:
      - analyze-commits
      - ci
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
    with:
      soapui-project: 'e2e/SoapUI/zaakbrug-e2e-soapui-project.xml'
      image-ref: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-staging@${{ needs.ci.outputs.image-digest }}
      setup-script: |
        docker compose -f compose.frank.loc.yaml -f ./contrib/compose.frank.postgres.yaml -f ./contrib/compose.openzaak.loc.yaml up -d
        echo "Services started. Waiting for OpenZaak to be healthy..."
        timeout 300s bash -c 'until [ "$(docker inspect -f "{{.State.Health.Status}}" open-zaak.dev 2>/dev/null)" == "healthy" ]; do sleep 5; done'
        echo "SUCCESS: OpenZaak is healthy. Proceeding to the next step..."
      teardown-script: |
        docker compose -f compose.frank.loc.yaml -f ./contrib/compose.frank.postgres.yaml -f ./contrib/compose.openzaak.loc.yaml down -v

  release:
    runs-on: ubuntu-latest
    needs: 
      - analyze-commits
      - ci
      - larva
      - soapui
    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #6.0.2
        with:
          token: ${{ secrets.WEAREFRANK_BOT_PAT }}

      - name: Download Pre-build Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #8.0.1
        with:
          pattern: pre-build-*
          merge-multiple: true
  
      - name: Download Build Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c #8.0.1
        with:
          pattern: build-*
          merge-multiple: true

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #6.4.0
        with:
          node-version: 24
      
      - name: Install dependencies
        run: yarn global add semantic-release @semantic-release/changelog @semantic-release/git @semantic-release/github @semantic-release/exec @semantic-release/release-notes-generator @semantic-release/commit-analyzer conventional-changelog-conventionalcommits
      
      - name: Semantic Release
        run: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.WEAREFRANK_BOT_PAT }}
          GH_TOKEN: ${{ secrets.WEAREFRANK_BOT_PAT }}

  docker-release:
    uses: wearefrank/ci-cd-templates/.github/workflows/docker-release-generic.yml@00b8c33dd29ef328ad7aa1a2732dc6f41f2e03f3 #2.4.10
    needs: 
    - analyze-commits
    - release
    secrets:
      token: ${{ secrets.GITHUB_TOKEN }}
      registry-username: ${{ secrets.DOCKERHUB_USERNAME }}
      registry-token: ${{ secrets.DOCKERHUB_TOKEN }}
    with:
      version: ${{ needs.analyze-commits.outputs.version-next }}
      image-registry: 'docker.io'

  update-helm:
    uses: ./.github/workflows/update-helm-chart.yml
    needs: 
      - release
      - analyze-commits
    secrets:
      token: ${{ secrets.WEAREFRANK_BOT_PAT }}
    with:
      version: ${{ needs.analyze-commits.outputs.version-next }}

  docusaurus-release:
    permissions:
      contents: read
      pages: write
      id-token: write
    needs: 
      - release
    # Set to true to enable Docusaurus publishing to GitHub Pages
    if: true
    uses: wearefrank/ci-cd-templates/.github/workflows/docusaurus-release.yml@00b8c33dd29ef328ad7aa1a2732dc6f41f2e03f3 #2.4.10
